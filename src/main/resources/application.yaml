server:
  port: 8080

spring:
  application:
    name: testpilot-ai-backend

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/testpilot_ai
    username: testpilot
    password: testpilot123

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

  ai:
    model:
      chat: openai
      embedding: openai
      image: none
      audio:
        speech: none
        transcription: none

    openai:
      api-key: ${DASHSCOPE_API_KEY:}

      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1

      chat:
        completions-path: /chat/completions
        options:
          model: qwen-plus
          temperature: 0.2

      embedding:
        embeddings-path: /embeddings
        options:
          model: text-embedding-v4

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

storage:
  minio:
    endpoint: http://localhost:9000
    access-key: testpilot
    secret-key: testpilot123
    bucket-name: testpilot-prd

springdoc:
  swagger-ui:
    path: /swagger-ui.html

ai:
  # Chat 模型配置
  chat:
    provider: spring-ai

    mock:
      model-name: mock-qwen-plus

    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      model-name: qwen-plus
      timeout-seconds: 120
      temperature: 0.2

    spring-ai:
      model-name: qwen-plus

  # Embedding 配置
  embedding:
    provider: spring-ai

    dimension: 1024

    mock:
      model-name: mock-hash-embedding-v1

    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings
      model-name: text-embedding-v4
      timeout-seconds: 60

    spring-ai:
      model-name: text-embedding-v4

agent:
  execution:
    task-timeout-seconds: 1800
    step-timeout-seconds: 600

ai-eval:
  execution:
    http-timeout-seconds: 120