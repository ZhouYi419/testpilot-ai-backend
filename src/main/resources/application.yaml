server:
  port: 8080

spring:
  application:
    name: testpilot-ai-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/testpilot_ai
    username: testpilot
    password: testpilot123
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.zy.testpilotai
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

testpilot:
  file:
    upload-dir: ./data/uploads

  ai:
    embedding:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${EMBEDDING_API_KEY:}
      model: text-embedding-v4
      dimension: 1024

    chat:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${LLM_API_KEY:}
      model: qwen-plus
      temperature: 0.2
      max-tokens: 2000

  minio:
    endpoint: http://localhost:9000
    access-key: testpilot
    secret-key: testpilot123
    bucket-name: testpilot-documents