services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: testpilot-postgres
    restart: always
    environment:
      POSTGRES_DB: testpilot_ai
      POSTGRES_USER: testpilot
      POSTGRES_PASSWORD: testpilot123
    ports:
      - "5432:5432"
    volumes:
      - testpilot_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testpilot -d testpilot_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: testpilot-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - testpilot_redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: testpilot-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: testpilot
      MINIO_ROOT_PASSWORD: testpilot123
    command: server /data --console-address ":9001"
    volumes:
      - testpilot_minio_data:/data

volumes:
  testpilot_postgres_data:
  testpilot_redis_data:
  testpilot_minio_data: