server:
  port: 8080

spring:
  application:
    name: testpilot-ai-backend

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/testpilot_ai
    username: testpilot
    password: testpilot123

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

storage:
  minio:
    endpoint: http://localhost:9000
    access-key: testpilot
    secret-key: testpilot123
    bucket-name: testpilot-prd

springdoc:
  swagger-ui:
    path: /swagger-ui.html

ai:
  embedding:
    # 当前 Embedding 提供方
    provider: dashscope

    # 通用维度配置
    dimension: 1024

    # mock 模式配置
    mock:
      model-name: mock-hash-embedding-v1

    # DashScope 模式配置
    dashscope:
      # 阿里云百炼 API Key
      api-key: ${DASHSCOPE_API_KEY:}

      # DashScope OpenAI Compatible Embedding 接口
      endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings

      # Embedding 模型名称
      model-name: text-embedding-v4

      # 请求超时时间，单位秒
      timeout-seconds: 60